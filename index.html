<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Page Title</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="script.js"></script>
  <div class="header"><h2>Sunrise Sunset Dashboard</h2></div>
  <div class="List">
    <label for="locations">Choose a location:</label>
    <select id="locations" name="locations">
      <option value="Chicago">Chicago, IL</option>
      <option value="Boston">Boston, MA</option>
      <option value="Sacramento">Sacramento, CA</option>
      <option value="Vegas">Las Vegas, NV</option>
      <option value="STL">St Louis, MO</option>
      <option value="Phoenix">Phoenix, AZ</option>
      <option value="Indiana">Michigan City, IN</option>
      <option value="Dublin">Dublin, Ireland</option>
      <option value="Rome">Rome, Italy</option>
      <option value="Milwaukee">Milwaukee, WI</option>
    </select>

  </div>
  <div class="container">
    <div class="subHeader"><h3>Today's Information</h3></div>
    <div class="sec-subHeader"><h3>Tomorrow's Information</h3></div>
    <div class="dash-tiles">
      <div class="block">
        <div class="label">Sunrise</div>
        <div class="data"><span id="sunrise"></span></div>
      </div>
      <div class="side-panel"><p>Time zone:</p><p>Location:</p></div>
      <div class="dawn">Dawn</div>
      <div class="sunrise">Sunrise</div>
      <div class="solarnoon">Solar Noon</div>
      <div class="sunset">Sunset</div>
      <div class="dusk">Dusk</div>
      <div class="daylength">Day Length</div>
    </div>
    <div class="sec-dash-tiles">
      <div class="side-panel"><p>Time zone:</p><p>Location:</p></div>
      <div class="dawn">Dawn</div>
      <div class="sunrise">Sunrise</div>
      <div class="solarnoon">Solar Noon</div>
      <div class="sunset">Sunset</div>
      <div class="dusk">Dusk</div>
      <div class="daylength">Day Length</div>
    </div>
  </div>
</body>
</html>
